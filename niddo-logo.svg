<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
    <linearGradient id="nestBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A86030"/>
      <stop offset="100%" stop-color="#6B3810"/>
    </linearGradient>
    <linearGradient id="nestRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D49A5A"/>
      <stop offset="100%" stop-color="#B07230"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7A3810" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background card -->
  <rect width="400" height="300" rx="22" fill="url(#bgGrad)"/>

  <!-- === NEST ICON === -->

  <!-- Ground shadow -->
  <ellipse cx="201" cy="176" rx="74" ry="10" fill="#7A3810" opacity="0.14"/>

  <!-- Nest outer body (bowl) -->
  <path d="M 134,122
           C 124,138 122,160 127,176
           C 133,196 166,208 200,208
           C 234,208 267,196 273,176
           C 278,160 276,138 266,122
           C 250,113 226,108 200,108
           C 174,108 150,113 134,122 Z"
        fill="url(#nestBody)" filter="url(#shadow)"/>

  <!-- Nest rim (opening ellipse) -->
  <ellipse cx="200" cy="120" rx="68" ry="17" fill="url(#nestRim)"/>

  <!-- Rim highlight shine -->
  <path d="M 148,114 A 56,10 0 0,1 252,114"
        stroke="#E8B878" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Nest inner hollow -->
  <ellipse cx="200" cy="122" rx="54" ry="13" fill="#1E0A02"/>

  <!-- ---- EGGS ---- -->
  <!-- Left egg (mint, tilted left) -->
  <ellipse cx="183" cy="112" rx="14" ry="18" fill="#7ECBB0" transform="rotate(-11,183,112)"/>
  <ellipse cx="180" cy="106" rx="4.5" ry="3" fill="white" opacity="0.38" transform="rotate(-11,180,106)"/>

  <!-- Center egg (sky blue, tallest) -->
  <ellipse cx="200" cy="108" rx="14" ry="18" fill="#6BB8D8"/>
  <ellipse cx="197" cy="102" rx="4.5" ry="3" fill="white" opacity="0.38"/>

  <!-- Right egg (powder blue, tilted right) -->
  <ellipse cx="217" cy="112" rx="14" ry="18" fill="#9EC4E0" transform="rotate(11,217,112)"/>
  <ellipse cx="214" cy="106" rx="4.5" ry="3" fill="white" opacity="0.38" transform="rotate(11,214,106)"/>

  <!-- ---- TWIG TEXTURE on bowl body ---- -->
  <path d="M 145,143 Q 174,131 208,136 Q 233,133 253,145"
        stroke="#5A2E10" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 139,155 Q 170,143 206,148 Q 233,145 257,157"
        stroke="#5A2E10" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M 138,167 Q 170,155 206,160 Q 233,157 258,168"
        stroke="#4A2408" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 141,179 Q 172,169 207,173 Q 233,171 255,180"
        stroke="#4A2408" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Crossing twigs (vertical) for woven look -->
  <path d="M 168,127 Q 163,158 165,190" stroke="#6B3810" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 232,127 Q 237,158 235,190" stroke="#6B3810" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Organic twig ends sticking out of nest sides -->
  <path d="M 136,128 Q 124,114 116,104" stroke="#9B5828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 264,128 Q 276,114 284,104" stroke="#9B5828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 142,120 Q 133,104 130,96"  stroke="#B06830" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 258,120 Q 267,104 270,96"  stroke="#B06830" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 150,116 Q 145,102 148,92"  stroke="#9B5828" stroke-width="2"   fill="none" stroke-linecap="round"/>
  <path d="M 250,116 Q 255,102 252,92"  stroke="#9B5828" stroke-width="2"   fill="none" stroke-linecap="round"/>

  <!-- === WORDMARK === -->
  <text x="200" y="254"
        font-family="'Trebuchet MS', 'Gill Sans MT', 'Calibri', Helvetica, sans-serif"
        font-size="76"
        font-weight="700"
        fill="#2A0E04"
        text-anchor="middle"
        letter-spacing="5">Niddo</text>

  <!-- Tagline -->
  <text x="200" y="281"
        font-family="'Trebuchet MS', 'Calibri', Helvetica, sans-serif"
        font-size="13"
        fill="#B07030"
        text-anchor="middle"
        letter-spacing="5.5">TU GUARDERÍA DIGITAL</text>
</svg>
